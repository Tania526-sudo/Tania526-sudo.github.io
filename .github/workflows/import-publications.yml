name: Import Publications from BibTeX

on:
  push:
    branches: ['main']
    paths: ['publications.bib']
    
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  import-publications:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'Tania526-sudo'

    steps:
      - name:  Checkout repository
        uses: actions/checkout@v3

      - name:  Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name:  Install academic CLI
        run: |
          python -m pip install --upgrade pip
          pip install academic==0.10.0

      - name:  Convert BibTeX to Markdown
        if: ${{ hashFiles('publications.bib') != '' }}
        run: academic import publications.bib content/publication/ --compact

      - name:  Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'content: import publications from BibTeX'
          title: Import latest publications from BibTeX
          body: |
            Automatically imported publications from `publications.bib` to `content/publication/`.

            See: https://github.com/GetRD/academic-file-converter
          base: main
          labels: automated-pr, publications
          branch: auto/import-publications
          delete-branch: true

      - name:  Output PR Info
        if: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          echo "Pull Request Number: ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL: ${{ steps.cpr.outputs.pull-request-url }}"

