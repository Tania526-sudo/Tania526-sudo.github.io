name:  Auto-update WIP branches (Tetiana)

on:
  schedule:
    - cron: '0 3 * * *'  
  workflow_dispatch:


permissions:
  contents: write
  pull-requests: write

jobs:
  update-wip-branches:
    if: github.repository_owner == 'Tania526-sudo'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find WIP branches and update them
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and rebase all branches matching wip/*
        run: |
          git fetch --all
          for branch in $(git branch -r | grep 'origin/wip/' | sed 's|origin/||'); do
            echo "Updating branch: $branch"
            git checkout $branch
            git pull --rebase origin main || true
            git push origin $branch || true
          done

